<script>
    let createFolderModal, createClassModal;

    document.addEventListener('DOMContentLoaded', async function() {
        // ====== NEW: LẤY TOKEN TỪ URL ======
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        if (token) {
            // Lưu token
            localStorage.setItem('token', token);

            // Xoá token khỏi URL (tránh lộ + sạch URL)
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        // ====== CHECK AUTH SAU KHI ĐÃ SET TOKEN ======
        if (!Utils.requireAuth()) return;
        
        // Initialize modals
        createFolderModal = new bootstrap.Modal(document.getElementById('createFolderModal'));
        createClassModal = new bootstrap.Modal(document.getElementById('createClassModal'));
        
        // Update welcome name
        const user = Utils.getCurrentUser();
        if (user) {
            document.getElementById('welcome-name').textContent = user.username;
        }
        
        // Load data
        await Promise.all([
            loadRecentFolders(),
            loadRecentClasses(),
            loadStats()
        ]);
        
        // Setup form handlers
        setupFormHandlers();
    });

    // ===== giữ nguyên toàn bộ code bên dưới =====
</script>
